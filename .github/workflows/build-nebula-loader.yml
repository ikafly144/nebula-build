name: Build NebulaLoader

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:       # Allow manual trigger
  pull_request:            # Run on PR pushes (for testing)

concurrency:
  group: build-nebula-loader-${{ github.event_name == 'pull_request' && github.ref || 'release' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check for NebulaLoader changes
        id: check
        run: |
          # Get the latest commit SHA that affected NebulaLoader/
          RESPONSE=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Dolly1016/Nebula-Public/commits?path=NebulaLoader%2F&per_page=1")

          LATEST_SHA=$(echo "$RESPONSE" | jq -r '.[0].sha')
          if [ "$LATEST_SHA" = "null" ] || [ -z "$LATEST_SHA" ]; then
            echo "Failed to get latest commit SHA"
            exit 1
          fi
          RELEASE_TAG="nebula-loader-${LATEST_SHA}"

          echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest NebulaLoader commit: $LATEST_SHA"
          echo "Release tag: $RELEASE_TAG"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pull_request run: always build for workflow validation"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if a release with this SHA tag already exists
          RELEASE_BODY_FILE=$(mktemp)
          trap 'rm -f "$RELEASE_BODY_FILE"' EXIT
          HTTP_STATUS=$(curl -s -o "$RELEASE_BODY_FILE" -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG")
          RELEASE_BODY=$(cat "$RELEASE_BODY_FILE")
          rm -f "$RELEASE_BODY_FILE"
          trap - EXIT

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Release already exists for $LATEST_SHA, skipping build"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_STATUS" = "404" ]; then
            echo "No existing release for $LATEST_SHA, will build"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Error checking existing release for $LATEST_SHA"
            echo "HTTP status: $HTTP_STATUS"
            echo "Response body:"
            echo "$RELEASE_BODY"
            exit 1
          fi

      - name: Setup .NET
        if: steps.check.outputs.needs_build == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Checkout NebulaLoader source
        if: steps.check.outputs.needs_build == 'true'
        run: |
          git clone --filter=blob:none --sparse \
            https://github.com/Dolly1016/Nebula-Public.git nebula-source
          cd nebula-source
          git sparse-checkout set NebulaLoader
          git checkout ${{ steps.check.outputs.latest_sha }}
          echo "Checked out NebulaLoader at ${{ steps.check.outputs.latest_sha }}"

      - name: Download BepInEx
        if: steps.check.outputs.needs_build == 'true'
        run: |
          # Find the newest BepInEx release (including pre-releases, since BepInEx 6.x for
          # Unity IL2CPP is still in "bleeding edge" and released as pre-releases) that has a
          # Linux x64 Unity IL2CPP asset. Releases are returned newest-first, so first() gives
          # the most recent matching release.
          ASSET_URL=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/BepInEx/BepInEx/releases" | \
            jq -r 'first(.[].assets[] | select(.name | test("Unity\\.IL2CPP-linux-x64.*\\.zip")) | .browser_download_url)')

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Failed to find BepInEx Unity IL2CPP Linux x64 asset"
            exit 1
          fi

          echo "Downloading BepInEx from: $ASSET_URL"
          curl -fsSL -o bepinex.zip "$ASSET_URL"

          # Extract the archive
          unzip -q bepinex.zip -d bepinex-extract
          chmod -R a+rX bepinex-extract

          # Set up the directory structure expected by the csproj: $(AmongUs)/BepInEx/core/
          mkdir -p "${{ github.workspace }}/among-us/BepInEx/interop"

          if [ -d "bepinex-extract/BepInEx/core" ]; then
            cp -r bepinex-extract/BepInEx/core "${{ github.workspace }}/among-us/BepInEx/"
          else
            echo "BepInEx/core directory not found. Archive contents:"
            find bepinex-extract -maxdepth 3 -type d
            exit 1
          fi

          echo "BepInEx core DLLs available:"
          ls "${{ github.workspace }}/among-us/BepInEx/core/"

      - name: Download Unity libraries from nuget.bepinex.dev
        if: steps.check.outputs.needs_build == 'true'
        run: |
          INTEROP_DIR="${{ github.workspace }}/among-us/BepInEx/interop"
          mkdir -p "$INTEROP_DIR"

          PACKAGE_ID="UnityEngine.Modules"
          PACKAGE_ID_LOWER=$(echo "$PACKAGE_ID" | tr '[:upper:]' '[:lower:]')
          REGISTRATION_INDEX_URL="https://nuget.bepinex.dev/v3/registration/${PACKAGE_ID_LOWER}/index.json"

          if ! curl -fsSL -o unityengine-modules-registration-index.json "$REGISTRATION_INDEX_URL"; then
            echo "Failed to download registration index: $REGISTRATION_INDEX_URL" >&2
            exit 1
          fi

          PACKAGE_CONTENT_URL=$(jq -r '
            [ .items[]? | .items[]? | {v:(.catalogEntry.version // "" | ascii_downcase), u:(.packageContent // "")}
              | select(.v != "" and .u != "") ]
            | sort_by(.v)
            | last
            | .u // empty
          ' unityengine-modules-registration-index.json)

          if [ -z "$PACKAGE_CONTENT_URL" ] || [ "$PACKAGE_CONTENT_URL" = "null" ]; then
            REGISTRATION_PAGE_URL=$(jq -r '
              [ .items[]? | {v:(.upper // .lower // "" | ascii_downcase), id:(.["@id"] // "")}
                | select(.id != "") ]
              | sort_by(.v)
              | last
              | .id // empty
            ' unityengine-modules-registration-index.json)

            if [ -z "$REGISTRATION_PAGE_URL" ] || [ "$REGISTRATION_PAGE_URL" = "null" ]; then
              echo "Failed to resolve registration page URL for ${PACKAGE_ID}" >&2
              exit 1
            fi

            if ! curl -fsSL -o unityengine-modules-registration-page.json "$REGISTRATION_PAGE_URL"; then
              echo "Failed to download registration page: $REGISTRATION_PAGE_URL" >&2
              exit 1
            fi

            PACKAGE_CONTENT_URL=$(jq -r '
              [ .items[]? | {v:(.catalogEntry.version // "" | ascii_downcase), u:(.packageContent // "")}
                | select(.v != "" and .u != "") ]
              | sort_by(.v)
              | last
              | .u // empty
            ' unityengine-modules-registration-page.json)
          fi

          if [ -z "$PACKAGE_CONTENT_URL" ] || [ "$PACKAGE_CONTENT_URL" = "null" ]; then
            echo "Failed to resolve packageContent URL for ${PACKAGE_ID}" >&2
            exit 1
          fi

          rm -rf unityengine-modules unityengine-modules.nupkg
          if ! curl -fsSL -o unityengine-modules.nupkg "$PACKAGE_CONTENT_URL"; then
            echo "Failed to download packageContent URL: $PACKAGE_CONTENT_URL" >&2
            exit 1
          fi
          if ! unzip -tq unityengine-modules.nupkg >/dev/null 2>&1; then
            echo "Downloaded file is not a valid nupkg archive: $PACKAGE_CONTENT_URL" >&2
            exit 1
          fi

          unzip -q unityengine-modules.nupkg -d unityengine-modules
          echo "Downloaded ${PACKAGE_ID} package from packageContent: $PACKAGE_CONTENT_URL"
          rm -f unityengine-modules.nupkg unityengine-modules-registration-index.json unityengine-modules-registration-page.json
          chmod -R a+rX unityengine-modules

          # Copy UnityEngine DLLs from package reference/runtime folders.
          if [ -d unityengine-modules/ref ]; then
            find unityengine-modules/ref -type f -name 'UnityEngine*.dll' -exec cp -f {} "$INTEROP_DIR"/ \;
          fi
          if [ -d unityengine-modules/lib ]; then
            find unityengine-modules/lib -type f -name 'UnityEngine*.dll' -exec cp -f {} "$INTEROP_DIR"/ \;
          fi
          COPIED_UNITY_DLL_COUNT=$(find "$INTEROP_DIR" -maxdepth 1 -type f -name 'UnityEngine*.dll' | wc -l)
          if [ "$COPIED_UNITY_DLL_COUNT" -eq 0 ]; then
            echo "No UnityEngine*.dll files were copied into interop directory." >&2
            exit 1
          fi

          echo "Unity interop DLLs available:"
          ls "$INTEROP_DIR" | head -n 50

      - name: Create CI project file
        if: steps.check.outputs.needs_build == 'true'
        run: |
          # Verify that the target file exists.
          if [ ! -f nebula-source/NebulaLoader/NebulaLoader.cs ]; then
            echo "CI preparation failed: nebula-source/NebulaLoader/NebulaLoader.cs is missing." >&2
            exit 1
          fi
          # Replace the csproj with a CI-appropriate version.
          # The original has post-build Copy targets that require a local game installation,
          # which are not needed in CI. We strip those out and keep the DLL references.
          cat > nebula-source/NebulaLoader/NebulaLoader.csproj << 'CSPROJ_EOF'
          <Project Sdk="Microsoft.NET.Sdk">

            <PropertyGroup>
              <OutputType>Library</OutputType>
              <TargetFramework>net6.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
              <LangVersion>latest</LangVersion>
            </PropertyGroup>

            <ItemGroup>
              <!-- Wildcard glob is the standard approach for BepInEx mods; MSBuild silently
                   produces an empty item group if no files match (e.g. empty interop dir). -->
              <Reference Include="$(AmongUs)/BepInEx/core/*.dll" />
              <Reference Include="$(AmongUs)/BepInEx/interop/*.dll" />
            </ItemGroup>

          </Project>
          CSPROJ_EOF

      - name: Build NebulaLoader
        if: steps.check.outputs.needs_build == 'true'
        run: |
          cd nebula-source/NebulaLoader
          dotnet build \
            -c Release \
            -p:AmongUs="${{ github.workspace }}/among-us"

          echo "Build output:"
          ls -la bin/Release/net6.0/

      - name: Upload build artifact
        if: steps.check.outputs.needs_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NebulaLoader-${{ steps.check.outputs.latest_sha }}
          path: nebula-source/NebulaLoader/bin/Release/net6.0/NebulaLoader.dll
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.check.outputs.needs_build == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.check.outputs.latest_sha }}"
          RELEASE_TAG="${{ steps.check.outputs.release_tag }}"
          SHORT_SHA="${SHA:0:7}"
          DATE=$(date -u +"%Y-%m-%d")
          DLL_PATH="nebula-source/NebulaLoader/bin/Release/net6.0/NebulaLoader.dll"

          gh release create "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --title "NebulaLoader ${SHORT_SHA} (${DATE})" \
            --notes "Automated build of NebulaLoader from [Dolly1016/Nebula-Public@${SHORT_SHA}](https://github.com/Dolly1016/Nebula-Public/commit/${SHA})" \
            "${DLL_PATH}#NebulaLoader.dll"
